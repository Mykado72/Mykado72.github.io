<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mes Listes de Courses</title>
    <base href="/MesListesDeCourses/" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" type="image/png" href="favicon.png"/>
</head>

<body>
    <div id="app">
        <div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px;font-family:Georgia,serif;">
            <div style="font-size:3rem">🛒</div>
            <div style="font-size:1.1rem;color:#2D6A4F;font-weight:700">Mes Listes de Courses</div>
            <div style="color:#888;font-size:0.9rem">Chargement...</div>
        </div>
    </div>

    <div id="blazor-error-ui">
        Une erreur est survenue.
        <a href="" class="reload">Recharger</a>
        <a class="dismiss">🗙</a>
    </div>

    <script src="_framework/blazor.webassembly.js"></script>

    <!-- GitHub Pages SPA fix : restaure l'URL après redirection depuis 404.html -->
    <script>
        (function () {
            var redirect = sessionStorage.getItem('spa-redirect');
            if (redirect) {
                sessionStorage.removeItem('spa-redirect');
                window.history.replaceState(null, null, redirect);
            }
        })();
    </script>
</body>
</html>
